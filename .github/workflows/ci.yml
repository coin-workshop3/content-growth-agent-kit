name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Check Python syntax
        run: python -m py_compile content_growth.py skills/generate-geo-tasks/scripts/generate_geo_tasks.py skills/score-enterprise-content/scripts/calculate_score.py skills/auto-edit-local-video/scripts/local_video.py scripts/smoke_test.py scripts/validate_contracts.py
      - name: Validate protocols and schemas
        run: python scripts/validate_contracts.py
      - name: Run smoke tests
        run: python scripts/smoke_test.py
